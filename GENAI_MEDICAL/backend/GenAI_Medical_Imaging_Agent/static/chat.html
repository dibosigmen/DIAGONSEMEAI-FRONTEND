<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MEDBOT – Medical AI Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/chat.css">
</head>
<body>

<div class="app-container">

    <!-- HEADER -->
  
  
  <!-- HEADER -->
<header class="topbar">
    <div class="brand">
        <img src="/static/logo.png" alt="MEDBOT" class="brand-logo">
        <span class="brand-text">MEDBOT</span>
    </div>
</header>


    <!-- MAIN CHAT -->
    <main class="chat-wrapper">

        <div class="chat-header">
            <img src="/static/doctor.png">
            <div>
                <h3>AI Medical Assistant</h3>
                <p>Ask medical questions safely</p>
                <p style="font-size:13px;color:#2563eb;margin-top:4px;">
                    <b>Tip:</b> Click the <img src="/static/mic.png" style="width:18px;vertical-align:middle;filter:none;"> button to ask by voice!
                </p>
            </div>
        </div>

        <div id="chat-box" class="chat-box"></div>

        <form id="chat-form" class="chat-input">
            <input
                type="text"
                id="user-input"
                placeholder="Type or speak your medical question…"
                autocomplete="off"
                required
            >
            <button type="button" id="voice-btn" title="Start voice assistant" style="margin-right:8px;">
                <img src="/static/mic.png" id="mic-icon" style="width:24px;height:24px;filter:grayscale(1);">
            </button>
            <button type="submit">
                <img src="/static/send.png">
            </button>
        </form>

    </main>

</div>

<script>
const chatBox = document.getElementById("chat-box");
const chatForm = document.getElementById("chat-form");
const userInput = document.getElementById("user-input");
const voiceBtn = document.getElementById("voice-btn");
const micIcon = document.getElementById("mic-icon");

let recognizing = false;
let recognition;
let voiceMode = false;

// Voice assistant: Speech Recognition (Web Speech API)
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.continuous = false;

    recognition.onstart = () => {
        recognizing = true;
        micIcon.style.filter = 'none';
        voiceBtn.title = "Stop voice assistant";
        userInput.placeholder = "Listening… Speak your question";
    };
    recognition.onend = () => {
        recognizing = false;
        micIcon.style.filter = 'grayscale(1)';
        voiceBtn.title = "Start voice assistant";
        userInput.placeholder = "Type or speak your medical question…";
    };
    recognition.onerror = (e) => {
        recognizing = false;
        micIcon.style.filter = 'grayscale(1)';
        userInput.placeholder = "Type or speak your medical question…";
    };
    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        userInput.value = transcript;
        voiceMode = true;
        chatForm.requestSubmit();
    };
} else {
    voiceBtn.style.display = 'none';
}

voiceBtn.addEventListener('click', (e) => {
    e.preventDefault();
    if (!recognition) return;
    if (recognizing) {
        recognition.stop();
    } else {
        recognition.start();
    }
});

function speak(text) {
    if (!('speechSynthesis' in window)) return;
    const utter = new window.SpeechSynthesisUtterance(text);
    utter.lang = 'en-US';
    utter.rate = 1;
    utter.pitch = 1;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utter);
}

function appendMessage(type, text) {
    const msg = document.createElement("div");
    msg.className = `message ${type}`;

    // Avatar
    const avatar = document.createElement("div");
    avatar.className = "avatar";
    if (type === "user") {
        avatar.innerHTML = '<img src="/static/patient1.png" style="width:32px">';
    } else {
        avatar.innerHTML = '<img src="/static/doctor.png" style="width:32px">';
    }

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

chatForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    const text = userInput.value.trim();
    if (!text) return;

    appendMessage("user", text);
    userInput.value = "";

    appendMessage("bot", "Analyzing…");

    try {
        const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text })
        });

        const data = await res.json();
        const botMsg = data.response || "No response.";
        chatBox.lastChild.querySelector(".bubble").textContent = botMsg;
        if (voiceMode) {
            speak("As your medical assistant, " + botMsg);
        }
    } catch (err) {
        chatBox.lastChild.querySelector(".bubble").textContent =
            "Server error. Please try again.";
    }
    voiceMode = false;
});

// Stop speaking if user clicks mic again while bot is talking
micIcon.addEventListener('click', () => {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
    }
});
</script>

</body>
</html>
